server:
  port: 8081

spring:
  application:
    name: Trysol-Enterprise-Suite

  datasource:
    url: jdbc:mysql://localhost:3306/Tes_db?createDatabaseIfNotExist=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show_sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  jwt:
    secret: mySuperSecretKeyForHRMSProject123456
    expiration: 3600000

  mail:
    host: smtp.gmail.com
    port: 587
    username: yourgmail@gmail.com
    password: your_app_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com